<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="https://vexacloud-assets.github.io/images/favicon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 — Page Not Found</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #090b10; color: #e8edf5;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .container { text-align: center; padding: 40px 24px; }
    .code { font-size: 120px; font-weight: 900; color: #00e5ff; line-height: 1; letter-spacing: -4px; }
    h1 { font-size: 28px; margin: 16px 0 8px; }
    p { color: #5a6478; margin-bottom: 32px; font-size: 15px; }
    .btn {
      display: inline-block; background: #00e5ff; color: #000;
      padding: 12px 28px; border-radius: 6px; text-decoration: none;
      font-weight: 700; font-size: 14px; margin: 0 8px;
      transition: opacity .2s;
    }
    .btn:hover { opacity: .85; }
    .btn.secondary { background: transparent; color: #00e5ff; border: 1px solid #00e5ff; }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <h1>Page Not Found</h1>
    <p>This page doesn't exist on our proxy server.</p>
    <a class="btn" href="/">Go Home</a>
    <a class="btn secondary" onclick="history.back(); return false;" href="#">Go Back</a>
  </div>
</body>
</html>
