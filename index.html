<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VexaCloud</title>
    <link rel="icon" href="https://vexacloud-assets.github.io/images/favicon.png" type="image/png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
            color: #fff;
        }
        .background-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(138, 43, 226, 0.1) 0%, transparent 50%), radial-gradient(circle at 80% 80%, rgba(72, 209, 204, 0.1) 0%, transparent 50%);
            animation: float 6s ease-in-out infinite;
            z-index: 0;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -30px); }
        }
        .container {
            position: relative;
            z-index: 1;
            background: rgba(15, 12, 41, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 60px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37), 0 0 60px rgba(138, 43, 226, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: slideUp 0.6s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo-container { text-align: center; margin-bottom: 40px; }
        .logo-container img { height: 60px; width: auto; margin-bottom: 15px; filter: drop-shadow(0 0 10px rgba(138, 43, 226, 0.5)); }
        h1 { font-size: 2.5em; font-weight: 700; background: linear-gradient(135deg, #8a2be2, #48d1cc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 10px; }
        .subtitle { font-size: 1em; color: rgba(255, 255, 255, 0.7); margin-bottom: 40px; }
        .form-group { margin-bottom: 25px; }
        label { display: block; font-size: 0.95em; font-weight: 500; margin-bottom: 10px; color: rgba(255, 255, 255, 0.9); }
        input[type="url"] { width: 100%; padding: 15px; border: 2px solid rgba(138, 43, 226, 0.3); background: rgba(255, 255, 255, 0.05); border-radius: 10px; color: #fff; font-size: 1em; }
        input[type="url"]:focus { outline: none; border-color: #8a2be2; background: rgba(138, 43, 226, 0.1); box-shadow: 0 0 15px rgba(138, 43, 226, 0.3); }
        .button-group { display: flex; gap: 15px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 10px; font-size: 1em; font-weight: 600; cursor: pointer; }
        .btn-primary { background: linear-gradient(135deg, #8a2be2, #48d1cc); color: white; }
        .btn-primary:hover { transform: translateY(-2px); }
        .btn-secondary { background: rgba(138, 43, 226, 0.2); color: #48d1cc; border: 2px solid #48d1cc; }
        .info-box { background: rgba(72, 209, 204, 0.1); border-left: 4px solid #48d1cc; padding: 15px; border-radius: 8px; margin-top: 30px; font-size: 0.9em; }
        @media (max-width: 600px) {
            .container { padding: 40px 25px; }
            h1 { font-size: 1.8em; }
            .button-group { flex-direction: column; }
            button { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="background-animation"></div>
    <div class="container">
        <div class="logo-container">
            <img src="https://vexacloud-assets.github.io/images/favicon.png" alt="VexaCloud">
            <h1>VexaCloud</h1>
            <p class="subtitle">Hacker114</p>
        </div>
        <form id="proxyForm">
            <div class="form-group">
                <label for="urlInput">Enter Website URL</label>
                <input type="url" id="urlInput" placeholder="https://example.com" required>
            </div>
            <div class="button-group">
                <button type="submit" class="btn-primary">Enter</button>
            </div>
        </form>
    <script>
        const form = document.getElementById('proxyForm');
        const urlInput = document.getElementById('urlInput');
        const demoBtn = document.getElementById('demoBtn');
        function validateUrl(url) {
            try {
                let urlToValidate = url;
                if (!url.match(/^https?:\/\//i)) {
                    urlToValidate = 'https://' + url;
                }
                new URL(urlToValidate);
                return urlToValidate;
            } catch (e) {
                return null;
            }
        }
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const userUrl = urlInput.value.trim();
            const validatedUrl = validateUrl(userUrl);
            if (validatedUrl) {
                const encodedUrl = encodeURIComponent(validatedUrl);
                window.location.href = `/proxy?url=${encodedUrl}`;
            }
        });
        demoBtn.addEventListener('click', function() {
            urlInput.value = 'https://httpbin.org';
            form.dispatchEvent(new Event('submit'));
        });
    </script>
</body>
</html>
