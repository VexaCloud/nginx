# ============================================================
# proxy.conf — /etc/nginx/conf.d/proxy.conf
# ============================================================

resolver 8.8.8.8 8.8.4.4 valid=300s;
resolver_timeout 5s;

# Extract hostname from ?url= for correct upstream Host header
map $arg_url $arg_url_host {
    ~^https?://([^/?#]+) $1;
    default               "";
}

# Extract just origin (scheme+host) from ?url= for <base> tag injection
map $arg_url $arg_url_origin {
    ~^(https?://[^/?#]+) $1;
    default               "";
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;
    root  /usr/share/nginx/html;
    index index.html;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;
    server_tokens off;

    add_header X-Content-Type-Options  "nosniff"                                  always;
    add_header X-XSS-Protection        "1; mode=block"                            always;
    add_header Referrer-Policy         "no-referrer"                               always;
    add_header Permissions-Policy      "geolocation=(), microphone=(), camera=()" always;

    client_max_body_size 10m;

    location = /sw.js {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
        add_header Content-Type "application/javascript" always;
    }

    location = /proxy-bootstrap.js {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store" always;
        add_header Content-Type "application/javascript" always;
    }

    # Static files and homepage
    location / {
        try_files $uri $uri/ =404;
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
            try_files $uri =404;
        }
    }

    # ── Proxy endpoint ─────────────────────────────────────────────────
    location ^~ /proxy {

        if ($arg_url = "") { return 302 /; }
        if ($arg_url !~ "^https?://") { return 400 "Only http/https allowed\n"; }

        # SSRF: block private/loopback ranges
        if ($arg_url ~* "^https?://(localhost|127\.|0\.0\.0\.0|10\.|172\.(1[6-9]|2[0-9]|3[01])\.|192\.168\.|169\.254\.|::1|fd[0-9a-f]{2}:|fe80:)") {
            return 403 "Private addresses blocked\n";
        }

        set $target_url $arg_url;
        proxy_pass $target_url;
        proxy_http_version 1.1;

        # Critical: send target site's hostname, not our server's
        proxy_set_header Host $arg_url_host;

        # Pass browser headers through so sites don't detect a bot
        proxy_pass_request_headers on;
        proxy_set_header Connection        "";
        proxy_set_header Accept-Encoding   "";   # keep blank for sub_filter to work
        proxy_set_header X-Forwarded-For   "";
        proxy_set_header X-Forwarded-Proto "";
        proxy_set_header X-Real-IP         "";
        proxy_set_header Origin            "";
        proxy_set_header Referer           "";
        proxy_set_header Cookie            "";

        proxy_cookie_path   ~^(.*)$ "/";
        proxy_cookie_domain ~^(.*)$ "~.";

        # Rewrite upstream Location headers using the browser's Host header
        # ($http_host = what the browser sent = your public Codespaces domain)
        proxy_redirect ~^https://(.+)$ $scheme://$http_host/proxy?url=https://$1;
        proxy_redirect ~^http://(.+)$  $scheme://$http_host/proxy?url=http://$1;

        # Prevent browser caching of redirects (stops redirect loops and stale cache)
        add_header Cache-Control "no-store, no-cache" always;

        proxy_ssl_verify              on;
        proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
        proxy_ssl_session_reuse       on;

        proxy_buffering            on;
        proxy_buffer_size          128k;
        proxy_buffers              16 128k;
        proxy_busy_buffers_size    256k;
        proxy_max_temp_file_size   256m;
        proxy_temp_file_write_size 128k;

        proxy_connect_timeout 15s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # IMPORTANT: proxy_intercept_errors must be OFF
        # With it ON, nginx intercepts upstream 404s and serves our 404.html
        # causing sites' own 404 pages to be replaced.
        # With it OFF:
        #   - Upstream 4xx/5xx -> pass through to browser as-is (correct)
        #   - nginx 502 (upstream unreachable) -> triggers error_page 502 below (correct)
        proxy_intercept_errors off;

        sub_filter_types text/plain text/xml text/css application/javascript application/json;
        sub_filter_once  off;

        # Inject <base href="real-origin/"> so relative URLs resolve correctly
        # AND inject bootstrap as first script in <head>
        sub_filter '<head>' '<head><base href="$arg_url_origin/"><script src="/proxy-bootstrap.js"></script>';
        sub_filter '<HEAD>' '<HEAD><base href="$arg_url_origin/"><script src="/proxy-bootstrap.js"></script>';

        # Rewrite protocol-relative URLs in HTML
        sub_filter 'src="//'    'src="/proxy?url=https://';
        sub_filter 'href="//'   'href="/proxy?url=https://';
        sub_filter 'srcset="//' 'srcset="/proxy?url=https://';
    }

    location = /health {
        access_log off;
        add_header Content-Type text/plain always;
        return 200 "OK\n";
    }

    location ~ /\. {
        deny all;
        access_log    off;
        log_not_found off;
    }

    # Custom error pages for OUR server's errors only:
    # 404: a path on our server doesn't exist (e.g. /missing-static-file)
    error_page 404 /404.html;
    # 502/503/504: nginx couldn't reach the upstream (proxy connection failed)
    # These are nginx-generated when proxy_pass fails, NOT upstream HTTP errors
    error_page 502 503 504 /proxy-error.html;

    location = /404.html {
        root /usr/share/nginx/html;
        internal;
    }
    location = /proxy-error.html {
        root /usr/share/nginx/html;
        internal;
    }
}
