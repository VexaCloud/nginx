# ============================================================
# proxy.conf  —  /etc/nginx/conf.d/proxy.conf
# ============================================================

resolver 8.8.8.8 8.8.4.4 valid=300s;
resolver_timeout 5s;

limit_req_zone $binary_remote_addr zone=proxy_limit:10m rate=60r/m;

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;
    root  /usr/share/nginx/html;
    index index.html;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;
    server_tokens off;

    add_header X-Content-Type-Options  "nosniff"                                  always;
    add_header X-XSS-Protection        "1; mode=block"                            always;
    add_header Referrer-Policy         "no-referrer"                               always;
    add_header Permissions-Policy      "geolocation=(), microphone=(), camera=()" always;

    client_max_body_size 10m;

    # ------------------------------------------------------------------
    # Service worker — no-cache so updates apply immediately
    # ------------------------------------------------------------------
    location = /sw.js {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
        add_header Content-Type "application/javascript" always;
    }

    location = /proxy-bootstrap.js {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store" always;
        add_header Content-Type "application/javascript" always;
    }

    # ------------------------------------------------------------------
    # Static site
    # ------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # ------------------------------------------------------------------
    # Proxy endpoint  /proxy?url=<target>
    # ------------------------------------------------------------------
    location ^~ /proxy {

        if ($arg_url = "") {
            return 302 /?error=missing_url;
        }

        if ($arg_url !~ "^https?://") {
            return 400 "Only http:// and https:// protocols are allowed\n";
        }

        if ($arg_url ~* "^https?://(localhost|127\.|0\.0\.0\.0|10\.|172\.(1[6-9]|2[0-9]|3[01])\.|192\.168\.|169\.254\.|::1|fd[0-9a-f]{2}:|fe80:)") {
            return 403 "Private/loopback addresses are not permitted\n";
        }

        limit_req zone=proxy_limit burst=40 nodelay;

        set $target_url $arg_url;
        proxy_pass $target_url;
        proxy_http_version 1.1;

        proxy_set_header Host              $proxy_host;
        proxy_set_header X-Original-URL    "";
        proxy_set_header X-Forwarded-For   "";
        proxy_set_header X-Forwarded-Proto "";
        proxy_set_header X-Real-IP         "";
        proxy_set_header Connection        "";
        proxy_set_header Accept-Encoding   "";
        proxy_set_header Cookie            "";

        proxy_cookie_path   ~^(.*)$ "/";
        proxy_cookie_domain ~^(.*)$ "~.";

        # Rewrite Location: redirect headers (e.g. crazygames.com -> www.crazygames.com)
        # so server-side redirects stay inside the proxy instead of sending the
        # browser to a bare external URL that escapes to localhost/nowhere.
        proxy_redirect https:// /proxy?url=https://;
        proxy_redirect http://  /proxy?url=http://;

        proxy_ssl_verify              on;
        proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
        proxy_ssl_session_reuse       on;

        proxy_buffering            on;
        proxy_buffer_size          128k;
        proxy_buffers              16 128k;
        proxy_busy_buffers_size    256k;
        proxy_max_temp_file_size   256m;
        proxy_temp_file_write_size 128k;

        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
        proxy_limit_rate      10m;

        # sub_filter rewrites URLs in response bodies.
        # The Service Worker handles runtime JS navigation on top of this.
        sub_filter_types text/plain text/xml text/css application/javascript application/json;
        sub_filter_once  off;

        # Inject SW bootstrap into every HTML page
        sub_filter '</head>' '<script src="/proxy-bootstrap.js"></script></head>';

        # Protocol-relative — must come before full scheme rewrites
        sub_filter 'src="//'    'src="/proxy?url=https://';
        sub_filter 'href="//'   'href="/proxy?url=https://';
        sub_filter 'srcset="//' 'srcset="/proxy?url=https://';

        # Full scheme rewrites
        sub_filter 'https://'  '/proxy?url=https://';
        sub_filter 'http://'   '/proxy?url=http://';

        # Attribute rewrites
        sub_filter 'src="http'    'src="/proxy?url=http';
        sub_filter "src='http"    "src='/proxy?url=http";
        sub_filter 'href="http'   'href="/proxy?url=http';
        sub_filter "href='http"   "href='/proxy?url=http";
        sub_filter 'action="http' 'action="/proxy?url=http';
        sub_filter "action='http" "action='/proxy?url=http";
    }

    location = /health {
        access_log off;
        add_header Content-Type text/plain always;
        return 200 "OK\n";
    }

    location ~ /\. {
        deny all;
        access_log    off;
        log_not_found off;
    }

    error_page 400 401 403 404 500 502 503 504 /index.html;
}
