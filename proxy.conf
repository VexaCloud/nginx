# ============================================================
# proxy.conf — VexaProxy
# ============================================================
resolver 8.8.8.8 8.8.4.4 valid=300s;
resolver_timeout 5s;

limit_req_zone $binary_remote_addr zone=proxy_limit:10m rate=60r/m;

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;
    server_tokens off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;

    client_max_body_size 10m;

    # Service Worker files
    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
        add_header Content-Type "application/javascript" always;
    }

    location = /proxy-bootstrap.js {
        add_header Cache-Control "no-store" always;
        add_header Content-Type "application/javascript" always;
    }

    location / {
        try_files $uri $uri/ /index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # ===================== MAIN PROXY =====================
    location ^~ /proxy {
        if ($arg_url = "") {
            return 302 /?error=missing_url;
        }
        if ($arg_url !~ "^https?://") {
            return 400 "Only http/https allowed";
        }
        if ($arg_url ~* "^https?://(localhost|127\.|0\.0\.0\.0|10\.|172\.(1[6-9]|2[0-9]|3[01])\.|192\.168\.|169\.254\.|::1)") {
            return 403 "Private addresses not allowed";
        }

        limit_req zone=proxy_limit burst=40 nodelay;

        set $target_url $arg_url;
        proxy_pass $target_url;

        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header Cookie "";

        proxy_cookie_path ~^(.*)$ "/";
        proxy_cookie_domain ~^(.*)$ "~.";

        # === FIXED REDIRECT HANDLING ===
        proxy_redirect off;
        proxy_redirect ~^(https?://)(.*)$ /proxy?url=$1$2;

        proxy_ssl_verify on;
        proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;

        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 16 128k;
        proxy_busy_buffers_size 256k;
        proxy_connect_timeout 15s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Sub-filter
        sub_filter_types text/html text/plain text/css application/javascript;
        sub_filter_once off;

        sub_filter '</head>' '<script src="/proxy-bootstrap.js"></script></head>';

        sub_filter '="//' '="/proxy?url=https://';
        sub_filter "='//" "='/proxy?url=https://";

        sub_filter 'https://' '/proxy?url=https://';
        sub_filter 'http://' '/proxy?url=http://';
    }

    location = /health { return 200 "OK\n"; }

    location ~ /\. { deny all; }

    error_page 400 401 403 404 500 502 503 504 /index.html;
}
