# ============================================================
# proxy.conf — VexaProxy
# ============================================================
resolver 8.8.8.8 8.8.4.4 valid=300s;

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    # Service Worker files - no cache
    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
        add_header Content-Type "application/javascript" always;
    }

    location = /proxy-bootstrap.js {
        add_header Cache-Control "no-store" always;
        add_header Content-Type "application/javascript" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ===================== MAIN PROXY =====================
    location ^~ /proxy {
        if ($arg_url = "") { return 302 /?error=missing_url; }
        if ($arg_url !~ "^https?://") { return 400 "Only http/https allowed"; }

        # Block private IPs
        if ($arg_url ~* "^https?://(localhost|127\.|0\.0\.0\.0|10\.|172\.(1[6-9]|2[0-9]|3[01])\.|192\.168\.|169\.254\.|::1)") {
            return 403 "Private addresses not allowed";
        }

        proxy_pass $arg_url;
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header Cookie "";

        proxy_cookie_path ~^(.*)$ "/";
        proxy_cookie_domain ~^(.*)$ "~.";

        # === ONLY ONE proxy_redirect ===
        proxy_redirect ~^(https?://)(.*)$ /proxy?url=$1$2;

        # Light sub_filter (only inject bootstrap)
        sub_filter_types text/html;
        sub_filter_once off;
        sub_filter '</head>' '<script src="/proxy-bootstrap.js"></script></head>';
        sub_filter '="//' '="/proxy?url=https://';
    }

    error_page 400 403 404 502 /index.html;
}
