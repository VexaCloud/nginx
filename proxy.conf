# ============================================================
# proxy.conf — /etc/nginx/conf.d/proxy.conf
# ============================================================

resolver 8.8.8.8 8.8.4.4 valid=300s;
resolver_timeout 5s;

# Extract hostname from ?url= for Host header and SNI
map $arg_url $arg_url_host {
    ~^https?://([^/?#]+) $1;
    default               "";
}

# Extract origin (scheme+host) from ?url= for <base> tag
map $arg_url $arg_url_origin {
    ~^(https?://[^/?#]+) $1;
    default               "";
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;
    root  /usr/share/nginx/html;
    index index.html;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;
    server_tokens off;

    # Relative redirects — browser prepends its own origin so works on any domain/scheme
    absolute_redirect off;

    add_header X-Content-Type-Options "nosniff" always;
    client_max_body_size 10m;

    location = /sw.js {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
        add_header Content-Type "application/javascript" always;
    }

    location = /proxy-bootstrap.js {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store" always;
        add_header Content-Type "application/javascript" always;
    }

    location / {
        try_files $uri $uri/ =404;
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
            try_files $uri =404;
        }
    }

    location ^~ /proxy {
        if ($arg_url = "") { return 302 /; }
        if ($arg_url !~ "^https?://") { return 400 "Only http/https\n"; }
        if ($arg_url ~* "^https?://(localhost|127\.|0\.0\.0\.0|10\.|172\.(1[6-9]|2[0-9]|3[01])\.|192\.168\.|169\.254\.|::1|fd[0-9a-f]{2}:|fe80:)") {
            return 403 "Private addresses blocked\n";
        }

        set $target_url $arg_url;
        proxy_pass $target_url;
        proxy_http_version 1.1;

        # Pass ALL browser headers by default then selectively clear dangerous ones
        proxy_pass_request_headers on;

        # Correct Host header — critical for virtual hosting and CDNs
        proxy_set_header Host               $arg_url_host;

        # Remove headers that expose proxy/cross-origin nature
        # nginx sends no header when value is empty string
        proxy_set_header Connection         "";
        proxy_set_header Accept-Encoding    "";
        proxy_set_header X-Forwarded-For    "";
        proxy_set_header X-Forwarded-Proto  "";
        proxy_set_header X-Forwarded-Host   "";
        proxy_set_header X-Real-IP          "";
        proxy_set_header Via                "";
        proxy_set_header Forwarded          "";
        proxy_set_header Origin             "";
        proxy_set_header Referer            "";
        proxy_set_header Cookie             "";
        # Sec-Fetch-* reveal cross-origin/proxy to servers
        proxy_set_header Sec-Fetch-Site     "";
        proxy_set_header Sec-Fetch-Mode     "";
        proxy_set_header Sec-Fetch-Dest     "";
        proxy_set_header Sec-Fetch-User     "";
        # Client hints reveal browser fingerprint
        proxy_set_header Sec-CH-UA          "";
        proxy_set_header Sec-CH-UA-Mobile   "";
        proxy_set_header Sec-CH-UA-Platform "";

        proxy_cookie_path   ~^(.*)$ "/";
        proxy_cookie_domain ~^(.*)$ "~.";

        # Relative Location rewrites — absolute_redirect off makes these stay relative.
        # Browser prepends its own origin, so works on any domain/port/scheme.
        proxy_redirect ~^https://(.+)$ /proxy?url=https://$1;
        proxy_redirect ~^http://(.+)$  /proxy?url=http://$1;

        # Prevent caching of redirects and responses
        add_header Cache-Control "no-store, no-cache" always;

        # TLS settings for upstream HTTPS connections
        proxy_ssl_verify              on;
        proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
        proxy_ssl_session_reuse       on;
        # CRITICAL: Send correct SNI with dynamic proxy_pass
        # Without this, nginx sends no SNI or sends the IP address as SNI.
        # CDNs (Akamai, Cloudflare) reject connections without correct SNI.
        # This is why xbox.com, easyfun, etc. return 502/connection refused.
        proxy_ssl_server_name         on;
        proxy_ssl_name                $arg_url_host;
        proxy_ssl_protocols           TLSv1.2 TLSv1.3;

        proxy_buffering            on;
        proxy_buffer_size          128k;
        proxy_buffers              16 128k;
        proxy_busy_buffers_size    256k;
        proxy_max_temp_file_size   256m;
        proxy_temp_file_write_size 128k;
        proxy_connect_timeout 15s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # OFF: upstream 4xx/5xx pass through as-is with site's own error pages
        # nginx-generated errors (502 when unreachable) still trigger error_page below
        proxy_intercept_errors off;

        sub_filter_types text/plain text/xml text/css application/javascript application/json;
        sub_filter_once  off;

        # Inject <base href="real-origin/"> so relative URLs resolve against real site
        sub_filter '<head>' '<head><base href="$arg_url_origin/"><script src="/proxy-bootstrap.js"></script>';
        sub_filter '<HEAD>' '<HEAD><base href="$arg_url_origin/"><script src="/proxy-bootstrap.js"></script>';

        # Rewrite protocol-relative URLs in HTML
        sub_filter 'src="//'    'src="/proxy?url=https://';
        sub_filter 'href="//'   'href="/proxy?url=https://';
        sub_filter 'srcset="//' 'srcset="/proxy?url=https://';
    }

    location = /health {
        access_log off;
        add_header Content-Type text/plain always;
        return 200 "OK\n";
    }

    location ~ /\. { deny all; access_log off; log_not_found off; }

    error_page 404 /404.html;
    error_page 502 503 504 /proxy-error.html;
    location = /404.html       { root /usr/share/nginx/html; internal; }
    location = /proxy-error.html { root /usr/share/nginx/html; internal; }
}
