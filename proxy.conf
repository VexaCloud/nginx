# ============================================================
# proxy.conf — /etc/nginx/conf.d/proxy.conf
# ============================================================

resolver 8.8.8.8 8.8.4.4 valid=300s;
resolver_timeout 5s;

limit_req_zone $binary_remote_addr zone=proxy_limit:10m rate=60r/m;

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    server_tokens off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    client_max_body_size 10m;

    # ------------------------------------------------------------------
    # Static files
    # ------------------------------------------------------------------
    location = /sw.js {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
        add_header Content-Type "application/javascript" always;
    }

    location = /proxy-bootstrap.js {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store" always;
        add_header Content-Type "application/javascript" always;
    }

    location / {
        try_files $uri $uri/ /index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # ------------------------------------------------------------------
    # Proxy endpoint /proxy?url=<target>
    # ------------------------------------------------------------------
    location ^~ /proxy {
        if ($arg_url = "") {
            return 302 /?error=missing_url;
        }

        if ($arg_url !~ "^https?://") {
            return 400 "Only http:// and https:// protocols are allowed\n";
        }

        # Block private/reserved IPs
        if ($arg_url ~* "^https?://(localhost|127\.|0\.0\.0\.0|10\.|172\.(1[6-9]|2[0-9]|3[01])\.|192\.168\.|169\.254\.|::1|fd[0-9a-f]{2}:|fe80:)") {
            return 403 "Private/loopback addresses are not permitted\n";
        }

        limit_req zone=proxy_limit burst=40 nodelay;

        set $target_url $arg_url;

        # Important headers
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Accept-Encoding "";
        proxy_set_header Cookie "";

        # Strip these so backend doesn't see proxy artifacts
        proxy_set_header X-Original-URL "";
        proxy_set_header X-Real-IP "";

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_pass $target_url;

        # === Redirect handling ===
        proxy_redirect off;                    # Disable default behavior
        proxy_redirect ~^(https?://[^/]+)(/.*)?$ /proxy?url=$1$2;

        # Also handle protocol-relative and root-relative redirects
        proxy_redirect ~^//(.*)$               /proxy?url=https://$1;
        proxy_redirect ~^/(.*)$                /proxy?url=$target_url/$1;

        # Cookie handling
        proxy_cookie_path ~^(.*)$ "/";
        proxy_cookie_domain ~^(.*)$ "~.";

        proxy_ssl_verify on;
        proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
        proxy_ssl_session_reuse on;

        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 16 128k;
        proxy_busy_buffers_size 256k;
        proxy_max_temp_file_size 256m;
        proxy_temp_file_write_size 128k;

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_limit_rate 10m;

        # === Body rewriting (sub_filter) ===
        sub_filter_types text/html text/plain text/xml text/css application/javascript application/json;
        sub_filter_once off;
        sub_filter_last_modified on;

        # Inject service worker bootstrap
        sub_filter '</head>' '<script src="/proxy-bootstrap.js"></script></head>' gi;

        # Careful order: more specific first
        sub_filter 'src="//'   'src="/proxy?url=https://' gi;
        sub_filter 'href="//'  'href="/proxy?url=https://' gi;
        sub_filter 'srcset="//' 'srcset="/proxy?url=https://' gi;

        sub_filter 'https://' '/proxy?url=https://' gi;
        sub_filter 'http://'  '/proxy?url=http://' gi;

        # Fallback attribute rewrites
        sub_filter 'src="http'  'src="/proxy?url=http' gi;
        sub_filter "src='http"  "src='/proxy?url=http" gi;
        sub_filter 'href="http' 'href="/proxy?url=http' gi;
        sub_filter "href='http" "href='/proxy?url=http" gi;
        sub_filter 'action="http' 'action="/proxy?url=http' gi;
        sub_filter "action='http" "action='/proxy?url=http" gi;
    }

    location = /health {
        access_log off;
        add_header Content-Type text/plain always;
        return 200 "OK\n";
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    error_page 400 401 403 404 500 502 503 504 /index.html;
}
