# ============================================================
# proxy.conf — /etc/nginx/conf.d/proxy.conf
# ============================================================

resolver 8.8.8.8 8.8.4.4 valid=300s;
resolver_timeout 5s;

map $arg_url $arg_url_host {
    ~^https?://([^/?#]+) $1;
    default               "";
}

map $arg_url $arg_url_origin {
    ~^(https?://[^/?#]+) $1;
    default               "";
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;
    root  /usr/share/nginx/html;
    index index.html;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;
    server_tokens off;

    # Disable absolute redirects so proxy_redirect produces relative Location headers.
    # A relative Location: /proxy?url=... works on any scheme/host/port automatically.
    # Without this, nginx converts /proxy?url=... to http://localhost/proxy?url=...
    absolute_redirect off;

    add_header X-Content-Type-Options "nosniff" always;
    client_max_body_size 10m;

    location = /sw.js {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
        add_header Content-Type "application/javascript" always;
    }

    location = /proxy-bootstrap.js {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store" always;
        add_header Content-Type "application/javascript" always;
    }

    location / {
        try_files $uri $uri/ =404;
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
            try_files $uri =404;
        }
    }

    location ^~ /proxy {
        if ($arg_url = "") { return 302 /; }
        if ($arg_url !~ "^https?://") { return 400 "Only http/https\n"; }
        if ($arg_url ~* "^https?://(localhost|127\.|0\.0\.0\.0|10\.|172\.(1[6-9]|2[0-9]|3[01])\.|192\.168\.|169\.254\.|::1|fd[0-9a-f]{2}:|fe80:)") {
            return 403 "Private addresses blocked\n";
        }

        set $target_url $arg_url;
        proxy_pass $target_url;
        proxy_http_version 1.1;

        # Send correct Host to upstream
        proxy_set_header Host $arg_url_host;

        # Pass browser headers through (User-Agent, Accept, Accept-Language etc.)
        proxy_pass_request_headers on;

        # Strip headers that reveal proxy/cross-origin nature to upstream sites
        proxy_set_header Connection         "";
        proxy_set_header Accept-Encoding    "";   # keep empty for sub_filter
        proxy_set_header X-Forwarded-For    "";
        proxy_set_header X-Forwarded-Proto  "";
        proxy_set_header X-Forwarded-Host   "";
        proxy_set_header X-Real-IP          "";
        proxy_set_header Origin             "";
        proxy_set_header Referer            "";
        proxy_set_header Cookie             "";
        # Strip Sec-Fetch-* — these reveal cross-origin/proxy to the upstream server
        proxy_set_header Sec-Fetch-Site     "";
        proxy_set_header Sec-Fetch-Mode     "";
        proxy_set_header Sec-Fetch-Dest     "";
        proxy_set_header Sec-Fetch-User     "";
        # Strip Client Hints — reveal browser fingerprint details
        proxy_set_header Sec-CH-UA          "";
        proxy_set_header Sec-CH-UA-Mobile   "";
        proxy_set_header Sec-CH-UA-Platform "";
        # Strip Via and CDN headers
        proxy_set_header Via                "";
        proxy_set_header Forwarded          "";

        proxy_cookie_path   ~^(.*)$ "/";
        proxy_cookie_domain ~^(.*)$ "~.";

        # Relative redirect — works on any host/scheme without configuration.
        # Browser receives Location: /proxy?url=https://www.site.com/path
        # and prepends its own origin, so https://myserver.com/proxy?url=... ✓
        proxy_redirect ~^https://(.+)$ /proxy?url=https://$1;
        proxy_redirect ~^http://(.+)$  /proxy?url=http://$1;

        # Prevent caching of redirects/responses
        add_header Cache-Control "no-store, no-cache" always;

        proxy_ssl_verify              on;
        proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
        proxy_ssl_session_reuse       on;

        proxy_buffering            on;
        proxy_buffer_size          128k;
        proxy_buffers              16 128k;
        proxy_busy_buffers_size    256k;
        proxy_max_temp_file_size   256m;
        proxy_temp_file_write_size 128k;
        proxy_connect_timeout 15s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # OFF: so upstream 4xx/5xx pass through as-is (site's own error pages show)
        proxy_intercept_errors off;

        sub_filter_types text/plain text/xml text/css application/javascript application/json;
        sub_filter_once  off;

        # Inject <base href="real-origin/"> so all relative URLs resolve against
        # the real site, then the SW intercepts those absolute external requests.
        # Inject bootstrap as very first script.
        sub_filter '<head>' '<head><base href="$arg_url_origin/"><script src="/proxy-bootstrap.js"></script>';
        sub_filter '<HEAD>' '<HEAD><base href="$arg_url_origin/"><script src="/proxy-bootstrap.js"></script>';

        # Rewrite protocol-relative URLs in HTML attributes
        sub_filter 'src="//'    'src="/proxy?url=https://';
        sub_filter 'href="//'   'href="/proxy?url=https://';
        sub_filter 'srcset="//' 'srcset="/proxy?url=https://';
    }

    location = /health {
        access_log off;
        add_header Content-Type text/plain always;
        return 200 "OK\n";
    }

    location ~ /\. { deny all; access_log off; log_not_found off; }

    error_page 404 /404.html;
    error_page 502 503 504 /proxy-error.html;
    location = /404.html       { root /usr/share/nginx/html; internal; }
    location = /proxy-error.html { root /usr/share/nginx/html; internal; }
}
