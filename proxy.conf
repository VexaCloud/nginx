# proxy.conf
resolver 8.8.8.8 8.8.4.4 valid=300s;

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    # Static files + SW
    location = /sw.js {
        add_header Cache-Control "no-store, no-cache" always;
        add_header Service-Worker-Allowed "/" always;
        add_header Content-Type "application/javascript" always;
    }
    location = /proxy-bootstrap.js {
        add_header Cache-Control "no-store" always;
        add_header Content-Type "application/javascript" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Main proxy
    location ^~ /proxy {
        if ($arg_url = "") { return 302 /?error=missing_url; }
        if ($arg_url !~ "^https?://") { return 400; }

        limit_req zone=proxy_limit burst=40 nodelay;   # add your limit_req_zone if you have it

        proxy_pass $arg_url;
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header Cookie "";

        proxy_cookie_path ~^(.*)$ "/";
        proxy_cookie_domain ~^(.*)$ "~.";

        # Redirect handling
        proxy_redirect off;
        proxy_redirect ~^(https?://)(.*)$ /proxy?url=$1$2;

        # Very light sub_filter (only inject bootstrap + protocol-relative)
        sub_filter_types text/html;
        sub_filter_once off;
        sub_filter '</head>' '<script src="/proxy-bootstrap.js"></script></head>';
        sub_filter '="//' '="/proxy?url=https://';
    }

    error_page 400 403 404 502 /index.html;
}
