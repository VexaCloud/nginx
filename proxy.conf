# ============================================================
# proxy.conf — /etc/nginx/conf.d/proxy.conf
# ============================================================

resolver 8.8.8.8 8.8.4.4 valid=300s;
resolver_timeout 5s;

# Extract hostname from ?url= for correct upstream Host header
map $arg_url $arg_url_host {
    ~^https?://([^/?#]+) $1;
    default               "";
}

# Extract just origin (scheme+host) from ?url= for <base> tag
map $arg_url $arg_url_origin {
    ~^(https?://[^/?#]+) $1;
    default               "";
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;
    root  /usr/share/nginx/html;
    index index.html;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;
    server_tokens off;

    add_header X-Content-Type-Options  "nosniff"                                  always;
    add_header X-XSS-Protection        "1; mode=block"                            always;
    add_header Referrer-Policy         "no-referrer"                               always;
    add_header Permissions-Policy      "geolocation=(), microphone=(), camera=()" always;

    client_max_body_size 10m;

    # Service worker — must have scope header and no caching
    location = /sw.js {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
        add_header Content-Type "application/javascript" always;
    }

    location = /proxy-bootstrap.js {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store" always;
        add_header Content-Type "application/javascript" always;
    }

    # Custom 404 page for files/paths that don't exist on THIS server
    location = /404.html {
        root /usr/share/nginx/html;
        internal;
    }

    # Custom proxy error page (upstream failed, timed out, etc.)
    location = /proxy-error.html {
        root /usr/share/nginx/html;
        internal;
    }

    # Static files / homepage
    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── Proxy endpoint ─────────────────────────────────────────────────
    location ^~ /proxy {

        if ($arg_url = "") { return 302 /; }
        if ($arg_url !~ "^https?://") { return 400 "Only http/https allowed\n"; }

        # SSRF: block private/loopback ranges
        if ($arg_url ~* "^https?://(localhost|127\.|0\.0\.0\.0|10\.|172\.(1[6-9]|2[0-9]|3[01])\.|192\.168\.|169\.254\.|::1|fd[0-9a-f]{2}:|fe80:)") {
            return 403 "Private addresses blocked\n";
        }

        set $target_url $arg_url;
        proxy_pass $target_url;
        proxy_http_version 1.1;

        # Send correct Host header to upstream
        proxy_set_header Host $arg_url_host;

        # Pass through browser headers so sites don't detect bot/proxy
        proxy_pass_request_headers on;
        proxy_set_header Connection        "";
        proxy_set_header X-Forwarded-For   "";
        proxy_set_header X-Forwarded-Proto "";
        proxy_set_header X-Real-IP         "";
        proxy_set_header Origin            "";
        proxy_set_header Referer           "";
        proxy_set_header Cookie            "";
        # Keep Accept-Encoding blank so sub_filter works on uncompressed responses
        proxy_set_header Accept-Encoding   "";
        # Pass Accept and User-Agent through from browser (proxy_pass_request_headers on)

        proxy_cookie_path   ~^(.*)$ "/";
        proxy_cookie_domain ~^(.*)$ "~.";

        # Rewrite redirect Location headers using $http_host
        # (= the browser's Host header = your public Codespaces domain)
        # Tested: correctly produces http://yourserver/proxy?url=https://www.site.com/path
        proxy_redirect ~^https://(.+)$ $scheme://$http_host/proxy?url=https://$1;
        proxy_redirect ~^http://(.+)$  $scheme://$http_host/proxy?url=http://$1;

        # Prevent browser from caching redirect responses
        # Without this, a 301 from site.com->www.site.com gets browser-cached
        # and future visits bypass the proxy entirely
        add_header Cache-Control "no-store, no-cache" always;

        proxy_ssl_verify              on;
        proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
        proxy_ssl_session_reuse       on;

        proxy_buffering            on;
        proxy_buffer_size          128k;
        proxy_buffers              16 128k;
        proxy_busy_buffers_size    256k;
        proxy_max_temp_file_size   256m;
        proxy_temp_file_write_size 128k;

        proxy_connect_timeout 15s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # Intercept upstream errors so we can show our own error page
        proxy_intercept_errors on;

        sub_filter_types text/plain text/xml text/css application/javascript application/json;
        sub_filter_once  off;

        # Inject <base> so relative URLs resolve against real origin
        # AND inject bootstrap as the very first script
        sub_filter '<head>' '<head><base href="$arg_url_origin/"><script src="/proxy-bootstrap.js"></script>';
        sub_filter '<HEAD>' '<HEAD><base href="$arg_url_origin/"><script src="/proxy-bootstrap.js"></script>';

        # Rewrite protocol-relative URLs in HTML
        sub_filter 'src="//'    'src="/proxy?url=https://';
        sub_filter 'href="//'   'href="/proxy?url=https://';
        sub_filter 'srcset="//' 'srcset="/proxy?url=https://';
    }

    location = /health {
        access_log off;
        add_header Content-Type text/plain always;
        return 200 "OK\n";
    }

    location ~ /\. {
        deny all;
        access_log    off;
        log_not_found off;
    }

    # ── Error pages ────────────────────────────────────────────────────
    # 404 on THIS server (static file not found, bad /proxy path, etc.)
    error_page 404 /404.html;
    # Upstream errors (bad gateway, timeout, upstream 500, etc.)
    error_page 500 502 503 504 /proxy-error.html;
    # Upstream returned 4xx — pass through to browser (it's the site's own error)
    # 400 401 403 are intentionally NOT here so upstream 403/401 pass through
}
